<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Жизнь-игра">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <title>⚡ Жизнь-игра</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            background: #16213e;
            border-radius: 20px;
            padding: 25px 20px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { font-size: 26px; color: #f5e0dc; margin-bottom: 5px; }
        .streak {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(233,69,96,0.6); }
            70% { box-shadow: 0 0 0 15px rgba(233,69,96,0); }
            100% { box-shadow: 0 0 0 0 rgba(233,69,96,0); }
        }
        .sync-status {
            font-size: 11px;
            color: #6c7086;
            margin-bottom: 8px;
            min-height: 16px;
            cursor: pointer;
        }
        .sync-status:hover { color: #a0a0b0; }
        .token-input-area {
            display: none;
            margin: 10px 0;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .token-input-area input {
            width: 220px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #533483;
            background: #0f3460;
            color: #e0e0e0;
            font-size: 12px;
        }
        .token-input-area button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: #533483;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        .stat-card {
            background: #0f3460;
            border-radius: 14px;
            padding: 15px 10px;
            transition: transform 0.1s;
        }
        .stat-card:active { transform: scale(0.95); }
        .stat-name { font-size: 13px; color: #a0a0b0; margin-bottom: 4px; }
        .stat-points { font-size: 34px; font-weight: bold; }
        .stat-points.back { color: #f38ba8; }
        .stat-points.abs { color: #a6e3a1; }
        .stat-points.meds { color: #74c7ec; }
        .stat-points.study { color: #cba6f7; }
        .quick-btns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .qbtn {
            padding: 12px 5px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            color: #1a1a2e;
            transition: all 0.1s;
        }
        .qbtn:active { transform: scale(0.92); filter: brightness(1.2); }
        .qbtn.back { background: #f38ba8; }
        .qbtn.abs { background: #a6e3a1; }
        .qbtn.meds { background: #74c7ec; }
        .qbtn.study { background: #cba6f7; }
        .add-row {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        select, input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            background: #0f3460;
            color: #e0e0e0;
        }
        select { min-width: 110px; }
        input { width: 70px; text-align: center; }
        .btn-add {
            background: #00b894;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-add:active { background: #00a381; }
        .total {
            margin: 10px 0;
            font-size: 18px;
        }
        .total span { font-weight: bold; color: #f5c2e7; font-size: 22px; }
        .pet-area {
            margin: 15px 0;
            font-size: 50px;
            position: relative;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .pet-area:active { transform: scale(1.2); }
        .pet-bubble {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #333;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .pet-area:hover .pet-bubble { opacity: 1; }
        .pet-name {
            font-size: 14px;
            color: #a0a0b0;
            margin-top: -5px;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            background: #533483;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:active { filter: brightness(1.3); }
        .btn.reset { background: #6c7086; }
        hr { border: 0; border-top: 1px solid #2a2a4a; margin: 15px 0; }
        .hint { color: #5a5a7a; font-size: 11px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ Жизнь-игра</h1>
    <div class="streak" id="streak-display">🔥 Дней подряд: 0</div>
    <div class="sync-status" id="sync-status" onclick="toggleTokenInput()">💾 Локально (нажми для синхронизации)</div>
    <div class="token-input-area" id="token-input-area">
        <input type="password" id="token-input" placeholder="Вставь GitHub токен (ghp_...)">
        <button onclick="saveToken()">💾 Сохранить</button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-name">🧘 Спина</div>
            <div class="stat-points back" id="back-points">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-name">💪 Пресс</div>
            <div class="stat-points abs" id="abs-points">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-name">💊 Лечение</div>
            <div class="stat-points meds" id="meds-points">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-name">📚 Учёба</div>
            <div class="stat-points study" id="study-points">0</div>
        </div>
    </div>

    <div class="total">🏆 Общий счёт: <span id="total-points">0</span></div>

    <div class="quick-btns">
        <button class="qbtn back" onclick="quickAdd('back', 5)">🧘 +5</button>
        <button class="qbtn abs" onclick="quickAdd('abs', 5)">💪 +5</button>
        <button class="qbtn meds" onclick="quickAdd('meds', 5)">💊 +5</button>
        <button class="qbtn study" onclick="quickAdd('study', 5)">📚 +5</button>
    </div>

    <div class="add-row">
        <select id="category-select">
            <option value="back">🧘 Спина</option>
            <option value="abs">💪 Пресс</option>
            <option value="meds">💊 Лечение</option>
            <option value="study">📚 Учёба</option>
        </select>
        <input type="number" id="points-input" value="10" min="1" max="999" step="1">
        <button class="btn-add" onclick="customAdd()">✅</button>
    </div>

    <div class="pet-area" id="pet-emoji" onclick="petClick()">🐣</div>
    <div class="pet-bubble" id="pet-bubble">Ты супер!</div>
    <div class="pet-name" id="pet-stage">Яйцо • 0 XP</div>

    <div class="btn-row">
        <button class="btn reset" onclick="resetAll()">🔄 Сброс</button>
    </div>

    <hr>
    <p class="hint">Токен хранится только в твоём браузере</p>
</div>

<script>
    // ========== SERVICE WORKER (для офлайн-режима и иконки на iOS) ==========
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register("data:application/javascript," + encodeURIComponent(
            "self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request).catch(function() { return caches.match(e.request); })); });" +
            "self.addEventListener('install', function(e) { self.skipWaiting(); });"
        )).catch(function(err) {
            console.log('SW register error (normal on iOS if no HTTPS scope):', err);
        });
    }

    // ========== ДАННЫЕ ==========
    const STORAGE_KEY = 'lifeGameDataV5';
    const TOKEN_STORAGE_KEY = 'lifeGameGistToken';
    const GIST_FILENAME = 'life-game-data.json';
    const GIST_DESCRIPTION = 'Life Game sync data';

    let data = getDefaultData();
    let GIST_ID = null;
    let syncEnabled = false;

    // ========== ЗВУК ==========
    let audioCtx = null;

    function getAudioCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
    }

    function playClick() {
        try {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') {
                ctx.resume();
            }
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.08);
        } catch(e) {
            // Без звука, если не получилось
        }
    }

    function getDefaultData() {
        return {
            back: 0,
            abs: 0,
            meds: 0,
            study: 0,
            totalXP: 0,
            lastActiveDate: null,
            streak: 0
        };
    }

    function loadLocalData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                const parsed = JSON.parse(raw);
                const def = getDefaultData();
                for (let key of Object.keys(def)) {
                    if (!(key in parsed)) parsed[key] = def[key];
                }
                return parsed;
            } catch(e) {}
        }
        return getDefaultData();
    }

    function saveLocalData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getToken() {
        return localStorage.getItem(TOKEN_STORAGE_KEY);
    }

    function saveTokenToStorage(token) {
        localStorage.setItem(TOKEN_STORAGE_KEY, token);
    }

    function toggleTokenInput() {
        const area = document.getElementById('token-input-area');
        area.style.display = area.style.display === 'flex' ? 'none' : 'flex';
    }

    async function saveToken() {
        const input = document.getElementById('token-input');
        const token = input.value.trim();
        if (!token || !token.startsWith('ghp_')) {
            alert('Токен должен начинаться с ghp_. Проверь, что скопировал полностью.');
            return;
        }
        saveTokenToStorage(token);
        document.getElementById('token-input-area').style.display = 'none';
        input.value = '';
        GIST_ID = null;
        syncEnabled = false;
        await loadFromCloud();
        updateUI();
    }

    // ========== GIST API ==========
    async function apiCall(url, options = {}) {
        const token = getToken();
        if (!token) throw new Error('No token');
        const response = await fetch(url, {
            ...options,
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                ...(options.headers || {})
            }
        });
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        return response.json();
    }

    async function loadGistId() {
        const gists = await apiCall('https://api.github.com/gists?per_page=100');
        for (let gist of gists) {
            if (gist.description === GIST_DESCRIPTION && gist.files[GIST_FILENAME]) {
                return gist.id;
            }
        }
        return null;
    }

    async function createGist() {
        const gist = await apiCall('https://api.github.com/gists', {
            method: 'POST',
            body: JSON.stringify({
                description: GIST_DESCRIPTION,
                public: false,
                files: {
                    [GIST_FILENAME]: {
                        content: JSON.stringify(data, null, 2)
                    }
                }
            })
        });
        return gist.id;
    }

    async function loadFromCloud() {
        const token = getToken();
        if (!token) {
            syncEnabled = false;
            data = loadLocalData();
            setStatus('💾 Локально (нажми для синхронизации)');
            return;
        }

        try {
            if (!GIST_ID) {
                GIST_ID = await loadGistId();
                if (!GIST_ID) {
                    const localData = loadLocalData();
                    if (localData.back > 0 || localData.abs > 0 || localData.meds > 0 || localData.study > 0) {
                        data = localData;
                    }
                    GIST_ID = await createGist();
                    setStatus('☁️ Облако подключено');
                }
            }

            const gist = await apiCall(`https://api.github.com/gists/${GIST_ID}`);
            const content = gist.files[GIST_FILENAME].content;
            const cloudData = JSON.parse(content);

            const localData = loadLocalData();
            if ((cloudData.totalXP || 0) >= (localData.totalXP || 0)) {
                data = cloudData;
            } else {
                data = localData;
                await saveToCloud();
            }

            syncEnabled = true;
            setStatus('☁️ Синхронизировано');
            saveLocalData();
        } catch (error) {
            console.error('Ошибка синхронизации:', error);
            syncEnabled = false;
            data = loadLocalData();
            setStatus('⚠️ Офлайн (локальные данные)');
        }
    }

    async function saveToCloud() {
        if (!syncEnabled || !GIST_ID || !getToken()) return;
        try {
            await apiCall(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                body: JSON.stringify({
                    files: {
                        [GIST_FILENAME]: {
                            content: JSON.stringify(data, null, 2)
                        }
                    }
                })
            });
            setStatus('☁️ Сохранено');
        } catch (error) {
            console.error('Ошибка сохранения в облако:', error);
            setStatus('⚠️ Не сохранено в облако');
        }
    }

    function setStatus(text) {
        const el = document.getElementById('sync-status');
        if (el) el.textContent = text;
    }

    // ========== STREAK ==========
    function updateStreak() {
        const today = new Date().toISOString().split('T')[0];
        if (data.lastActiveDate === today) return;
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        if (data.lastActiveDate === yesterday) {
            data.streak = (data.streak || 0) + 1;
        } else if (data.lastActiveDate !== today) {
            data.streak = 1;
        }
        data.lastActiveDate = today;
    }

    // ========== XP & PET ==========
    function addXP(amount) {
        data.totalXP = (data.totalXP || 0) + amount;
    }

    function getPetStage() {
        const xp = data.totalXP || 0;
        if (xp >= 5000) return { emoji: '🐉', name: 'Дракон' };
        if (xp >= 2000) return { emoji: '🦊', name: 'Лис' };
        if (xp >= 1000) return { emoji: '🐶', name: 'Щенок' };
        if (xp >= 500)  return { emoji: '🐱', name: 'Котёнок' };
        if (xp >= 100)  return { emoji: '🐤', name: 'Цыплёнок' };
        return { emoji: '🐣', name: 'Яйцо' };
    }

    function updatePet() {
        const stage = getPetStage();
        document.getElementById('pet-emoji').textContent = stage.emoji;
        document.getElementById('pet-stage').textContent = stage.name + ' • ' + (data.totalXP || 0) + ' XP';
    }

    function petClick() {
        const stage = getPetStage();
        const bubbles = {
            'Яйцо': 'Тук-тук! 🥚',
            'Цыплёнок': 'Пи-пи! Я расту!',
            'Котёнок': 'Мяу! Ты классный!',
            'Щенок': 'Гав! Давай ещё!',
            'Лис': 'Хе-хе! Как дела?',
            'Дракон': 'РАУР! Ты легенда!'
        };
        const bubble = document.getElementById('pet-bubble');
        bubble.textContent = bubbles[stage.name] || 'Привет!';
        bubble.style.opacity = '1';
        setTimeout(() => { bubble.style.opacity = '0'; }, 2000);
        playClick();
    }

    // ========== ADD POINTS ==========
    async function addPoints(category, amount) {
        if (amount <= 0 || isNaN(amount)) return;
        data[category] = (data[category] || 0) + amount;
        addXP(amount);
        updateStreak();
        saveLocalData();
        await saveToCloud();
        playClick();
        updateUI();
    }

    function quickAdd(category, amount) {
        addPoints(category, amount);
    }

    function customAdd() {
        const category = document.getElementById('category-select').value;
        const input = document.getElementById('points-input');
        const amount = parseInt(input.value, 10);
        if (isNaN(amount) || amount <= 0) {
            alert('Введи положительное число!');
            return;
        }
        addPoints(category, amount);
        input.value = 10;
    }

    async function resetAll() {
        if (confirm('Точно хочешь обнулить ВСЕ баллы и стрик?')) {
            data = getDefaultData();
            saveLocalData();
            await saveToCloud();
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('back-points').textContent = data.back || 0;
        document.getElementById('abs-points').textContent = data.abs || 0;
        document.getElementById('meds-points').textContent = data.meds || 0;
        document.getElementById('study-points').textContent = data.study || 0;
        const total = (data.back || 0) + (data.abs || 0) + (data.meds || 0) + (data.study || 0);
        document.getElementById('total-points').textContent = total;
        document.getElementById('streak-display').textContent = '🔥 Дней подряд: ' + (data.streak || 0);
        updatePet();
    }

    // ========== INIT ==========
    async function init() {
        // Разблокируем аудио при первом касании (для iOS)
        document.addEventListener('touchstart', function() {
            try {
                const ctx = getAudioCtx();
                if (ctx.state === 'suspended') ctx.resume();
            } catch(e) {}
        }, { once: true });

        await loadFromCloud();
        updateUI();
    }

    init();
</script>
</body>
</html>
