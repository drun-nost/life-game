<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Жизнь-игра</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            background: #16213e;
            border-radius: 20px;
            padding: 25px 20px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { font-size: 26px; color: #f5e0dc; margin-bottom: 5px; }

        /* Streak */
        .streak {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(233,69,96,0.6); }
            70% { box-shadow: 0 0 0 15px rgba(233,69,96,0); }
            100% { box-shadow: 0 0 0 0 rgba(233,69,96,0); }
        }

        /* Stats grid */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        .stat-card {
            background: #0f3460;
            border-radius: 14px;
            padding: 15px 10px;
            transition: transform 0.1s;
        }
        .stat-card:active { transform: scale(0.95); }
        .stat-name { font-size: 13px; color: #a0a0b0; margin-bottom: 4px; }
        .stat-points { font-size: 34px; font-weight: bold; }
        .stat-points.back { color: #f38ba8; }
        .stat-points.abs { color: #a6e3a1; }
        .stat-points.meds { color: #74c7ec; }
        .stat-points.study { color: #cba6f7; }

        /* Quick add buttons */
        .quick-btns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .qbtn {
            padding: 12px 5px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            color: #1a1a2e;
            transition: all 0.1s;
        }
        .qbtn:active { transform: scale(0.92); filter: brightness(1.2); }
        .qbtn.back { background: #f38ba8; }
        .qbtn.abs { background: #a6e3a1; }
        .qbtn.meds { background: #74c7ec; }
        .qbtn.study { background: #cba6f7; }

        /* Custom add */
        .add-row {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        select, input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            background: #0f3460;
            color: #e0e0e0;
        }
        select { min-width: 110px; }
        input { width: 70px; text-align: center; }
        .btn-add {
            background: #00b894;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-add:active { background: #00a381; }

        /* Total */
        .total {
            margin: 10px 0;
            font-size: 18px;
        }
        .total span { font-weight: bold; color: #f5c2e7; font-size: 22px; }

        /* Pet */
        .pet-area {
            margin: 15px 0;
            font-size: 50px;
            position: relative;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .pet-area:active { transform: scale(1.2); }
        .pet-bubble {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #333;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .pet-area:hover .pet-bubble { opacity: 1; }
        .pet-name {
            font-size: 14px;
            color: #a0a0b0;
            margin-top: -5px;
        }

        /* Buttons row */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            background: #533483;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:active { filter: brightness(1.3); }
        .btn.reset { background: #6c7086; }
        .btn.export { background: #2d6a4f; }
        .btn.import { background: #b5838d; }

        hr { border: 0; border-top: 1px solid #2a2a4a; margin: 15px 0; }

        .hint { color: #5a5a7a; font-size: 11px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ Жизнь-игра</h1>

    <!-- Streak -->
    <div class="streak" id="streak-display">🔥 Дней подряд: 0</div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-name">🧘 Спина</div>
            <div class="stat-points back" id="back-points">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-name">💪 Пресс</div>
            <div class="stat-points abs" id="abs-points">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-name">💊 Лечение</div>
            <div class="stat-points meds" id="meds-points">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-name">📚 Учёба</div>
            <div class="stat-points study" id="study-points">0</div>
        </div>
    </div>

    <!-- Total -->
    <div class="total">🏆 Общий счёт: <span id="total-points">0</span></div>

    <!-- Quick buttons -->
    <div class="quick-btns">
        <button class="qbtn back" onclick="quickAdd('back', 5)">🧘 +5</button>
        <button class="qbtn abs" onclick="quickAdd('abs', 5)">💪 +5</button>
        <button class="qbtn meds" onclick="quickAdd('meds', 5)">💊 +5</button>
        <button class="qbtn study" onclick="quickAdd('study', 5)">📚 +5</button>
    </div>

    <!-- Custom add -->
    <div class="add-row">
        <select id="category-select">
            <option value="back">🧘 Спина</option>
            <option value="abs">💪 Пресс</option>
            <option value="meds">💊 Лечение</option>
            <option value="study">📚 Учёба</option>
        </select>
        <input type="number" id="points-input" value="10" min="1" max="999" step="1">
        <button class="btn-add" onclick="customAdd()">✅</button>
    </div>

    <!-- Pet -->
    <div class="pet-area" id="pet-emoji" onclick="petClick()">🐣</div>
    <div class="pet-bubble" id="pet-bubble">Ты супер!</div>
    <div class="pet-name" id="pet-stage">Яйцо • 0 XP</div>

    <!-- Action buttons -->
    <div class="btn-row">
        <button class="btn export" onclick="exportData()">📤 Экспорт</button>
        <button class="btn import" onclick="importData()">📥 Импорт</button>
        <button class="btn reset" onclick="resetAll()">🔄 Сброс</button>
    </div>

    <hr>
    <p class="hint">Баллы сохраняются в браузере • Нажми на питомца!</p>
</div>

<script>
    // ========== DATA ==========
    const STORAGE_KEY = 'lifeGameDataV2';
    let data = loadData();

    function getDefaultData() {
        return {
            back: 0,
            abs: 0,
            meds: 0,
            study: 0,
            totalXP: 0,
            lastActiveDate: null,   // 'YYYY-MM-DD'
            streak: 0
        };
    }

    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                const parsed = JSON.parse(raw);
                // убедимся что все поля есть
                const def = getDefaultData();
                for (let key of Object.keys(def)) {
                    if (!(key in parsed)) parsed[key] = def[key];
                }
                return parsed;
            } catch(e) {}
        }
        return getDefaultData();
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ========== STREAK ==========
    function updateStreak() {
        const today = new Date().toISOString().split('T')[0]; // 'YYYY-MM-DD'
        if (data.lastActiveDate === today) {
            // уже был активен сегодня — стрик не меняется
            return;
        }
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        if (data.lastActiveDate === yesterday) {
            // был активен вчера — увеличиваем стрик
            data.streak += 1;
        } else if (data.lastActiveDate !== today) {
            // пропуск — начинаем заново (но если это первый запуск, стрик станет 1)
            data.streak = 1;
        }
        data.lastActiveDate = today;
        saveData();
    }

    function recordActivity() {
        updateStreak();
        updateUI();
    }

    // ========== XP & PET ==========
    function addXP(amount) {
        data.totalXP += amount;
    }

    function getPetStage() {
        const xp = data.totalXP;
        if (xp >= 5000) return { emoji: '🐉', name: 'Дракон' };
        if (xp >= 2000) return { emoji: '🦊', name: 'Лис' };
        if (xp >= 1000) return { emoji: '🐶', name: 'Щенок' };
        if (xp >= 500)  return { emoji: '🐱', name: 'Котёнок' };
        if (xp >= 100)  return { emoji: '🐤', name: 'Цыплёнок' };
        return { emoji: '🐣', name: 'Яйцо' };
    }

    function updatePet() {
        const stage = getPetStage();
        document.getElementById('pet-emoji').textContent = stage.emoji;
        document.getElementById('pet-stage').textContent = stage.name + ' • ' + data.totalXP + ' XP';
    }

    function petClick() {
        const stage = getPetStage();
        const bubbles = {
            'Яйцо': 'Тук-тук! 🥚',
            'Цыплёнок': 'Пи-пи! Я расту!',
            'Котёнок': 'Мяу! Ты классный!',
            'Щенок': 'Гав! Давай ещё!',
            'Лис': 'Хе-хе! Как дела?',
            'Дракон': 'РАУР! Ты легенда!'
        };
        const bubble = document.getElementById('pet-bubble');
        bubble.textContent = bubbles[stage.name] || 'Привет!';
        bubble.style.opacity = '1';
        setTimeout(() => { bubble.style.opacity = '0'; }, 2000);
        vibrate();
    }

    // ========== VIBRATION ==========
    function vibrate() {
        if (navigator.vibrate) {
            navigator.vibrate(15); // короткая вибрация 15мс
        }
    }

    // ========== ADD POINTS ==========
    function addPoints(category, amount) {
        if (amount <= 0 || isNaN(amount)) return;
        data[category] += amount;
        addXP(amount);
        recordActivity();
        saveData();
        vibrate();
        updateUI();
    }

    function quickAdd(category, amount) {
        addPoints(category, amount);
    }

    function customAdd() {
        const category = document.getElementById('category-select').value;
        const input = document.getElementById('points-input');
        const amount = parseInt(input.value, 10);
        if (isNaN(amount) || amount <= 0) {
            alert('Введи положительное число!');
            return;
        }
        addPoints(category, amount);
        input.value = 10;
    }

    // ========== RESET ==========
    function resetAll() {
        if (confirm('Точно хочешь обнулить ВСЕ баллы и стрик?')) {
            data = getDefaultData();
            saveData();
            updateUI();
        }
    }

    // ========== EXPORT / IMPORT ==========
    function exportData() {
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'life_game_backup.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    // простая проверка структуры
                    if ('back' in imported && 'abs' in imported && 'meds' in imported && 'study' in imported) {
                        data = imported;
                        saveData();
                        updateUI();
                        alert('✅ Данные успешно загружены!');
                    } else {
                        alert('❌ Неверный формат файла.');
                    }
                } catch(e) {
                    alert('❌ Ошибка чтения файла.');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    // ========== UI ==========
    function updateUI() {
        document.getElementById('back-points').textContent = data.back;
        document.getElementById('abs-points').textContent = data.abs;
        document.getElementById('meds-points').textContent = data.meds;
        document.getElementById('study-points').textContent = data.study;
        const total = data.back + data.abs + data.meds + data.study;
        document.getElementById('total-points').textContent = total;

        document.getElementById('streak-display').textContent = '🔥 Дней подряд: ' + (data.streak || 0);

        updatePet();
    }

    // ========== INIT ==========
    updateUI();
</script>
</body>
</html>
